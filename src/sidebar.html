<aside id="sidebar" class="notion-sidebar is-collapsed" aria-label="Navegação principal">
  <div id="sidebar-root" class="sidebar-nav-shell"></div>
  <div class="sidebar-notes-shell">
    <div class="sidebar-search">
      <input id="search-input" placeholder="Buscar notas..." autocomplete="off"/>
    </div>
    <div class="sidebar-section">
      <select id="workspace-select" class="sidebar-select" title="Workspace atual"></select>
    </div>
    <div class="notes-list" id="notes-list"></div>
    <div class="sidebar-tags" id="tags-bar"></div>
    <div class="sidebar-row sidebar-row-bottom">
      <button class="mini-btn" id="btn-workspaces" title="Gerenciar pastas/workspaces">Pastas</button>
      <button class="mini-btn" id="btn-favorites-filter" title="Mostrar favoritas">Favoritas</button>
      <button class="mini-btn" id="btn-trash-filter" title="Abrir lixeira">Lixeira</button>
    </div>
    <button class="new-note-btn" id="btn-new-note">+ Nova Nota</button>
  </div>
</aside>
